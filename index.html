<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a56db" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- SEO & Accessibility Metadata -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="JanSahayak AI (जन सहायक) - Your AI-Powered Indian Government and Education Assistant Platform. Guided step-by-step forms, documentation toolkits, and timelines in 9 regional languages." />
    <meta name="author" content="JanSahayak AI Team" />
    
    <title>JanSahayak AI - Indian Government & Education Assistant</title>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register service worker for offline installation capability -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('JanSahayak PWA Service Worker Registered', reg.scope))
            .catch(err => console.error('PWA Service Worker Registration Failed', err));
        });
      }
    </script>
  </body>
</html>
